title: Estrategista De Conta
date: 2020-02-25T20:31:56.164Z
image: /images/uploads/01.png
body: >-
  **Orgânico** – É aquele onde não colocamos dinheiro nele para que as pessoas
  visualizam, quando você faz uma postagem no
  facebook,[](http://instagram.com/salesguilherme_) instagram... e não coloca
  investimento financeiro nessas criativos para impulsionar, seu negócio fica a
  merce das pessoas que já conhecem esse negócio ou podem visitar de alguma
  forma.


  **Pago** – É quando você deposita um investimento financeiro em suas
  criativos, artigos, vídeos… para que novas pessoas ou até mesmo pessoas que já
  te conhecem de alguma forma sejam alcançadas com uma facilidade e eficiência
  maior.
