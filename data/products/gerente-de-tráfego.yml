title: Growth Hacker
date: 2020-02-18T17:47:56.036Z
image: /images/uploads/man-using-computer.e015e682.png
body: >-
  *Marketing orientado a experimentos.*


  De forma mais ampla ,**o Growth Hacking é um modelo de estratégia de marketing
  inovadora.**


  O marketing tradicional baseia sua execução em pontos como compra de mídia
  (anúncios), redes sociais, relações públicas e eventos.


  Já o Marketing Growth Hacking combina técnicas de [inbound
  marketing](https://rockcontent.com/blog/o-que-e-inbound-marketing/?utm_source=blog&utm_campaign=rc_blogpost),
  [SEO](https://rockcontent.com/blog/seo-o-guia-definitivo/?utm_source=blog&utm_campaign=rc_blogpost),
  [conteúdos
  virais](https://rockcontent.com/blog/podcast-sobre-viralizacao-de-conteudo/?utm_source=blog&utm_campaign=rc_blogpost),
  [testes
  A/B](https://rockcontent.com/blog/o-que-sao-testes-ab/?utm_source=blog&utm_campaign=rc_blogpost),
  marketing de recomendação, entre outros caminhos criativos.


  É interessante perceber que esse tipo de estratégia usa uma **abordagem
  científica** para fazer as **organizações expandirem mais rapidamente**.


  Daí a definição de “marketing orientado a experimentos”.


  O grande objetivo do Growth Hacking é encontrar “atalhos” para fazer a empresa
  crescer de forma acelerada.
