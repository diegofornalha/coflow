title: Gerente de Tráfego
date: 2020-02-27T03:03:17.207Z
image: /images/uploads/01.png
weight: Daniel da Silva
price: "01"
body: "Nosso gestor de tráfego útiliza as principais ferramentas hoje que são:
  Facebook, Instagram e Google. Facebook é um ótimo lugar para mostrar seu
  serviços e produtos.  Mas lembrando que, se trata de uma rede social, antes de
  mais nada, se relacione com seu público.  Instagram: A rede social que vem
  crescendo de forma absurda, antes só a “garotada” tinha instagram,  hoje
  aposto que seu pai, mãe, tia, tio… muitos deles possuem uma conta por lá.
  Google: A ferramenta número 1  de buscas na internet."
