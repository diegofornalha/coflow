body: >-
  Responsavel por auxiliar nos repasses do trágego orgânico e pago, no organico
  não colocamos dinheiro nele para que as pessoas visualizem os criativos, quando 
  você faz uma postagem no facebook, instagram… e não coloca impulsionamento pago, 
  seu negócio fica a merce das pessoas que já conhecem esse negócio ou podem visitar de alguma forma. 
  Por outro lado o anúncio pago é quando você investe em criativos e impulsiona com objetivo de conversão.