title: Estrátegista de Conta
date: 2020-02-27T02:58:39.145Z
image: /images/uploads/02.png
weight: 'Diego Fornalha'
price: '03'
body: >-
  Uma profissão muito nova ainda é Gestor de tráfego, apesar de muitas pessoas 
  fazerem tráfego não fazem de forma profissional. Antes de falar sobre gestão 
  de tráfego, precisamos saber o que é tráfego. Tráfego nada mais é que fazer a 
  coleta de dados, entender o que esses dados estão mostrando e fazer gerenciamento 
  dele. Se você tem um fluxo de pessoas acessando um determinado anúncio, 
  você precisa entender a interação da sua audiência para segmentar e ter 
  melhores resultados. E é isso que um gestor de tráfego faz, nós coletamos 
  dados e segmentamos para obter os melhores resultados para nós mesmo e para 
  nossos clientes.