backend:
  name: git-gateway

media_folder: source/images/uploads
public_folder: /images/uploads

#publish_mode: editorial_workflow #optional, enables publishing workflow

collections:
  #yaml middleman data example
  - name: product
    label: Product
    format: yml
    extension: yml
    folder: data/products/
    create: true
    slug: '{{title}}'
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Publish Date, name: date, widget: datetime}
      - {label: Image, name: image, widget: image, required: true}
      - {label: Body, name: body, widget: markdown}

#markdown middleman blog example
  - name: blog
    label: Blog
    folder: source/posts/
    extension: .html.md
    format: frontmatter
    create: true
    slug: '{{title}}'
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Publish Date, name: date, widget: datetime}
      - {label: Description, name: description, widget: string}
      - {label: Image, name: image, widget: image}
      - {label: Body, name: body, widget: markdown}

  - name: pages
    label: Pages
    files:
      - file: "data/pages/home.yml"
        label: Homepage
        name: home
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - {label: Title, name: title, widget: string}
              - {label: Image, name: image, widget: image}
          - label: Story
            name: story
            widget: markdown

  - name: settings
    label: Settings
    files:
      - file: data/settings/navigation.yml
        label: Navigation
        name: navigation
        fields:
          - label: Navigation
            name: nav_items
            widget: list
            fields:
              - {label: Label, name: label, widget: string}
              - {label: Path, name: path, widget: string}
      - file: data/settings/units.yml
        label: Units
        name: units
        fields:
          - label: Currency
            name: currency
            widget: select
            options: ['']
            default: ''

          - label: Weight
            name: weight
            widget: select
            options: ['']
            default: ''


#vou tentar adicionar novas funcionalidades no cms

      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "category"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "hidden"
        default: "{{slug}}"
      - label: "Description"
        name: "description"
        widget: "string"
        required: false
  - label: "Posts"
    name: "posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{title}}"
    extension: "md"
    fields:
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
      - label: "Description"
        name: "description"
        hint: "Isso será usado nas páginas e nos mecanismos de pesquisa."
        widget: "string"
      - label: "Featured Image"
        name: "image"
        widget: "image"
        allow_multiple: false
        required: false
      - label: "Optimized Image"
        name: "optimized_image"
        widget: "image"
        allow_multiple: false
        required: false
        hint: "Você pode definir uma versão otimizada da imagem para mostrar na página inicial"
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "categories"
        searchFields: ["title"]
        valueField: "slug"
        displayFields: ["title"]
      - label: "Tags"
        name: "tags"
        hint: "Separe com vírgulas. Eles também serão usados ​​como palavras-chave para os mecanismos de pesquisa."
        widget: "list"
      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "authors"
        displayFields: [display_name]
        searchFields: [display_name]
        valueField: "name"
      - label: "Paginate"
        name: "paginate"
        widget: "boolean"
        default: false
      - label: "Body"
        name: "body"
        widget: "markdown"
  - label: "Pages"
    name: "pages"
    folder: "pages"
    create: true
    slug: "{{slug}}"
    preview_path: "{{slug}}"
    extension: "md"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "page"
      - label: "Show in menu"
        name: "menu"
        widget: "boolean"
        default: true
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Permalink"
        name: "permalink"
        widget: "hidden"
        default: "/{{slug}}/"
      - label: "Description"
        name: "description"
        hint: "This will be used as description for search engines."
        widget: "string"
        required: false
      - label: "Keywords"
        name: "tags"
        hint: "Separate with commas. These will also be used as keywords for search engines."
        widget: "list"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
  - label: "Authors"
    name: "authors"
    folder: "_authors/"
    create: true
    editor:
      preview: false
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "author"
      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Use a square picture"
      - label: "Short Name"
        name: "name"
        widget: "string"
      - label: "Diplay Name"
        name: "display_name"
        widget: "string"
      - label: "Position"
        name: "position"
        widget: "string"
        required: false
      - label: "Bio"
        name: "bio"
        widget: "text"
      - label: "GitHub Username"
        name: "github_username"
        widget: "string"
        required: false
      - label: "Facebook Username"
        name: "facebook_username"
        widget: "string"
        required: false
      - label: "Twitter Username"
        name: "twitter_username"
        widget: "string"
        required: false
      - label: "Instagram Username"
        name: "instagram_username"
        widget: "string"
        required: false
      - label: "LinkedIn Username"
        name: "linkedin_username"
        widget: "string"
        required: false
      - label: "Medium Username"
        name: "medium_username"
        widget: "string"
        required: false
  - label: "Settings"
    name: "settings"
    editor:
      preview: false
    delete: false
    files:
      - label: "Site"
        name: "site"
        file: "src/yml/site.yml"
        fields:
          - label: "Name"
            name: "name"
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Description"
            name: "description"
            widget: "string"
            hint: "This will be used as description for search engines."
          - label: "Keywords"
            name: "tags"
            hint: "Separate with commas. These will also be used as keywords for search engines."
            widget: "list"
            required: false
          - label: "Show Hero"
            name: "show_hero"
            widget: "boolean"
            default: true
          - label: "E-mail"
            name: "email"
            widget: "string"
            hint: "Leave it blank if you don't want a contact page"
            required: false
          - label: "Disqus Username"
            name: "disqus_username"
            widget: "string"
            hint: "Leave it blank if you don't want comments"
            required: false
          - label: "Posts per page"
            name: "paginate"
            widget: "number"
            valueType: "int"
            required: false
            hint: "Leave it blank if you don't want pagination"
      - label: "Social"
        name: "social"
        file: "src/yml/social.yml"
        fields:
          - label: "GitHub Username"
            name: "github_username"
            widget: "string"
            required: false
          - label: "Facebook Username"
            name: "facebook_username"
            widget: "string"
            required: false
          - label: "Twitter Username"
            name: "twitter_username"
            widget: "string"
            required: false
          - label: "Instagram Username"
            name: "instagram_username"
            widget: "string"
            required: false
          - label: "LinkedIn Username"
            name: "linkedin_username"
            widget: "string"
            required: false
          - label: "Medium Username"
            name: "medium_username"
            widget: "string"
            required: false
      - label: "Theme"
        name: "theme"
        file: "src/yml/theme.yml"
        fields:
          - label: "Theme Color"
            name: "themeColor"
            widget: "color"
            default: "#ff0a16"
          - label: "Primary Dark Color"
            name: "primaryDark"
            widget: "color"
            default: "#141414"
          - label: "Accent Dark Color"
            name: "accentDark"
            default: "#ffffff"
            widget: "color"
          - label: "Light Gray Color"
            name: "lightGray"
            widget: "color"
            default: "#f2f2f2"
          - label: "Texts Color"
            name: "texts"
            widget: "color"
            default: "#333333"
      - label: "Posts"
        name: "posts"
        file: "src/yml/posts.yml"
        fields:
          - label: "Show time bar in posts"
            name: "show_time_bar"
            widget: "boolean"
            default: true
          - label: "Show modal on exit"
            name: "show_modal_on_exit"
            widget: "boolean"
            default: false
          - label: "Show modal on finish post"
            name: "show_modal_on_finish_post"
            widget: "boolean"
            default: false
          - label: "Two columns layout"
            name: "two_columns_layout"
            widget: "boolean"
            default: true
      - label: "Advanced"
        name: "advanced"
        file: "src/yml/advanced.yml"
        fields:
          - label: "Base URL"
            name: "baseurl"
            widget: "string"
            hint: "The subpath of your site, e.g. /blog"
          - label: "URL"
            name: "url"
            widget: "string"
            hint: "The base hostname and protocol for your site, e.g. https://rossener.com"
          - label: "Google Analytics ID"
            name: "google_analytics"
            widget: "string"
            required: false
          - label: "Language"
            name: "language"
            widget: "string"
            hint: "Content language, ex: pt-BR, en, fr"